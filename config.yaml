paths:
  pdf_dir: "./doc"
  index_dir: "./indexes"
  log_dir: "./logs"

chunking:
  strategy: "hierarchy"

  hierarchy:
    min_chunk_chars: 200
    max_chunk_chars: 1500
    merge_short_siblings: true

  semantic:
    embed_model: "BAAI/bge-large-zh-v1.5"
    breakpoint_threshold: 85
    min_chunk_chars: 100
    max_chunk_chars: 2000

  fixed_size:
    chunk_size: 800
    overlap: 150

embedding:
  model: "BAAI/bge-large-zh-v1.5"
  device: "cuda"
  normalize: true

retrieval:
  keyword_top_k: 2
  rewritten_top_k: 5
  score_threshold: 0.2   # 向量余弦相似度下限；Hybrid 模式下不作用于 RRF 融合分
  section_boost: 1.1       # keyword 命中 section_path 时 RRF 分数倍率；设为 1.0 关闭

  keyword_search:
    enabled: true          # 是否启用关键词检索路径（keyword top_k）

  bookmark_match:
    enabled: true          # 是否用 PDF 书签 + qwen2.5 匹配章节并召回 chunk
    leaf_only: true        # 仅用叶子小节（最细粒度，如 车辆控制>空调）供 LLM 匹配
    max_matches: 3          # 最多匹配几个书签章节
    chunks_per_match: 2    # 每个书签章节最多取几个 chunk
    model: "qwen2.5:7b"
    temperature: 0.0

  hybrid_search:
    enabled: true
    bm25_weight: 0.4
    keyword_bm25_weight: 0.6  # keyword 路径 BM25 权重（偏关键词召回）
    rrf_k: 60

  metadata_filter:
    enabled: true

query_rewrite:
  enabled: true            # 是否启用 Ollama 问句改写（rewritten_q 检索路径）
  model: "qwen2.5:7b"
  temperature: 0.0
  max_history_turns: 2   # 最近一轮单独传入；此项仅控制「更早」用户问题条数

verification:
  enabled: true            # 召回后是否用 qwen2.5 核对（仅 hybrid 路径，书签 chunk 跳过）
  model: "qwen2.5:7b"
  temperature: 0.0
  min_keep: 2              # hybrid 路径至少保留条数，避免误杀 GT

session:
  chunk_cache:
    max_size: 20
    reuse_threshold: 0.55
    max_reuse: 3

generation:
  model: "qwen3.6-plus"
  api_key_env: "DASHSCOPE_API_KEY"
  base_url_env: "DASHSCOPE_BASE_URL"
  temperature: 0.1
  max_tokens: 2048
  enable_thinking: false   # 非流式调用须显式关闭思考模式

logging:
  verbose: true
  save_qa_log: true
